<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/ethobot_mark.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETHOBOT - AI Ethics Education Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700;6..72,800&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            headline: ['Newsreader', 'serif'],
            body: ['Manrope', 'sans-serif'],
          },
          colors: {
            'lyceum-ink': '#002428',
            'lyceum-ink-soft': '#0d3b3f',
            'lyceum-paper': '#fcf9ef',
            'lyceum-paper-deep': '#f1eee4',
            'lyceum-paper-soft': '#f7f4e9',
            'lyceum-line': '#d8d2c3',
            'lyceum-muted': '#6b6f67',
            'lyceum-accent': '#904d00',
            'lyceum-accent-soft': '#ffdcc3',
            'lyceum-highlight': '#fe932c',
            'alabama-crimson': '#904d00',
            'crimson-dark': '#6e3900',
            'crimson-light': '#fff4ea',
          },
          boxShadow: {
            ambient: '0 12px 40px rgba(28, 28, 22, 0.08)',
            panel: '0 18px 50px rgba(0, 36, 40, 0.08)',
          },
          animation: {
            blob: 'blob 7s infinite',
            float: 'float 20s infinite linear',
            'pulse-slow': 'pulse 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            float: {
              '0%': { transform: 'translateY(0) rotate(0deg)', opacity: '0' },
              '10%': { opacity: '0.3' },
              '90%': { opacity: '0.3' },
              '100%': { transform: 'translateY(-1000px) rotate(360deg)', opacity: '0' },
            },
          },
        },
      },
    };
  </script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "react-hot-toast": "https://aistudiocdn.com/react-hot-toast@^2.6.0",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 220, 195, 0.32), transparent 28%),
        radial-gradient(circle at top right, rgba(163, 206, 211, 0.22), transparent 24%),
        #fcf9ef;
      color: #1c1c16;
    }

    h1,
    h2,
    h3,
    .font-headline {
      font-family: 'Newsreader', serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
